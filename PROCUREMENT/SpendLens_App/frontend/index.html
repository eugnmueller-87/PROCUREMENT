<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SpendLens — Procurement Intelligence</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="SpendLens — procurement analytics: spend intelligence, supplier risk, compliance flags, and AI market signals." />
<meta name="color-scheme" content="light dark" />
<meta name="theme-color" content="#f9f8f6" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#141824" media="(prefers-color-scheme: dark)" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 28'%3E%3Crect width='28' height='28' rx='7' fill='%231B2A4A'/%3E%3Crect x='8.5' y='8.5' width='11' height='11' rx='2' fill='none' stroke='%23ffffff' stroke-width='1.5' transform='rotate(45 14 14)'/%3E%3C/svg%3E" />

<!-- Apply saved/OS theme before first paint to avoid a white flash for dark users -->
<script>
(function () {
  var t = localStorage.getItem("theme") || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  document.documentElement.setAttribute("data-theme", t);
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<!-- NOTE: Babel-standalone transpiles JSX in-browser on every load. Fine for dev; for production,
     precompile once (npx @babel/cli --presets @babel/preset-react frontend --out-dir frontend/dist)
     and swap the type="text/babel" tags below for plain <script src="dist/…"> tags. -->
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"><div style="display:grid;place-items:center;height:100vh;font-family:Geist,ui-sans-serif,system-ui,'Segoe UI',sans-serif;color:var(--ink-3);background:var(--bg);">Loading SpendLens…</div></div>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

</body>
</html>
